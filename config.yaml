# MLP 超参数配置
# 修改这里的值后运行 train.py，然后执行 /mlp-tune 进行分析

data:
  n_samples: 800          # 训练集样本数
  n_features: 20          # 输入维度
  n_classes: 2            # 分类类别数
  val_ratio: 0.2          # 验证集比例
  random_seed: 42

model:
  hidden_dims: [64]       # 每个隐藏层的维度，列表长度即隐藏层数
  activation: relu        # 激活函数：relu / tanh / gelu
  dropout_rate: 0.40

training:
  learning_rate: 0.0014
  weight_decay: 0.0012
  batch_size: 32
  epochs: 50
  optimizer: adam
  lr_scheduler: none      # none / step / cosine
  early_stop_patience: 20
